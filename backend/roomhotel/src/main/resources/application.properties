spring.application.name=roomhotel
server.port=8080

#  Base de datos PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# update: Hibernate crea las tablas si no existen y agrega columnas nuevas
# NUNCA borra datos existentes
spring.jpa.hibernate.ddl-auto=update

# muestra el SQL generado útil en desarrollo para verificar que las queries son correctas
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Email (Mailtrap)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true